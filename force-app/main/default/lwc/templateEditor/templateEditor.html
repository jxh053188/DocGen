<template>
    <!-- Hidden wrapper component for loading libraries -->
    <!-- Workaround for known Salesforce issue: https://help.salesforce.com/s/issue?id=a028c00000gAxQiAAK -->
    <c-docxtemplater-loader></c-docxtemplater-loader>

    <lightning-card title={template.Name} icon-name="custom:custom55">
        <div class="slds-p-around_medium">
            <!-- Header with Actions and Sidebar Toggle -->
            <div class="slds-grid slds-grid_align-spread slds-m-bottom_medium">
                <div class="slds-col">
                    <template if:true={isWordTemplate}>
                        <!-- Word Template: File Upload/Management -->
                        <template if:true={showFileUpload}>
                            <div class="slds-box slds-m-bottom_small">
                                <h3 class="slds-text-heading_small slds-m-bottom_x-small">Upload Word Template</h3>
                                <p class="slds-text-body_small slds-m-bottom_small">
                                    Upload a .docx file with template syntax
                                </p>
                                <lightning-input type="file" accept=".docx" label="Word Document"
                                    onchange={handleFileUpload}>
                                </lightning-input>
                                <template if:true={uploadedFileName}>
                                    <p class="slds-text-body_small slds-m-top_x-small slds-text-color_success">
                                        ✓ File ready: {uploadedFileName}
                                    </p>
                                </template>
                            </div>
                        </template>

                        <!-- File Info Section (if file exists) -->
                        <template if:true={showFileInfo}>
                            <div class="slds-box slds-m-bottom_small">
                                <h3 class="slds-text-heading_small slds-m-bottom_x-small">Word Template File</h3>
                                <div class="slds-grid slds-grid_align-spread slds-m-bottom_small">
                                    <div>
                                        <lightning-icon icon-name="doctype:word" size="small"
                                            class="slds-m-right_x-small"></lightning-icon>
                                        <span class="slds-text-body_regular">{templateFileName}</span>
                                    </div>
                                    <lightning-button-icon icon-name="utility:delete" variant="destructive"
                                        alternative-text="Delete file" onclick={handleDeleteFile} disabled={isLoading}>
                                    </lightning-button-icon>
                                </div>
                                <p class="slds-text-body_small slds-text-color_weak">
                                    To replace this file, delete it first and upload a new one.
                                </p>
                            </div>
                        </template>
                    </template>
                </div>
                <div class="slds-col slds-no-flex">
                    <lightning-button-icon 
                        icon-name={sidebarIcon} 
                        alternative-text={sidebarVisibleText}
                        onclick={toggleSidebar}
                        class="slds-m-left_small">
                    </lightning-button-icon>
                </div>
            </div>

            <!-- Main Content Area -->
            <div class="slds-grid slds-wrap slds-gutters">
                <!-- Editor Section - Full width when sidebar hidden, 2/3 when visible -->
                <div class={editorColumnClass}>
                    <!-- HTML Template: HTML Editor -->
                    <template if:true={showHtmlEditor}>
                        <div class="slds-m-bottom_medium">
                            <div class="slds-grid slds-grid_align-spread slds-m-bottom_small">
                                <label class="slds-form-element__label slds-no-flex">
                                    <abbr class="slds-required" title="required">*</abbr> HTML Template
                                </label>
                            </div>
                            <div class="editor-full-width">
                                <c-rich-text-editor value={htmlBody} onchange={handleRichTextChange} show-card="false"></c-rich-text-editor>
                            </div>
                        </div>
                    </template>

                    <!-- Action Buttons -->
                    <div class="slds-m-top_medium">
                        <lightning-button label="Save Template" variant="brand" onclick={handleSave}
                            disabled={isLoading} class="slds-m-right_small"></lightning-button>
                        <lightning-button label="Discover Fields" variant="neutral" onclick={handleDiscoverFields}
                            disabled={isLoading}></lightning-button>
                    </div>
                </div>

                <!-- Sidebar - Hidden when collapsed, 1/3 width when visible -->
                <template if:true={sidebarVisible}>
                    <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 sidebar-container">
                        <div class="slds-box slds-m-bottom_small">
                            <h3 class="slds-text-heading_small slds-m-bottom_small">Template Info</h3>
                            <lightning-combobox label="Source Type" value={sourceType} options={sourceTypeOptions}
                                onchange={handleSourceTypeChange} disabled={isLoading} class="slds-m-bottom_small">
                            </lightning-combobox>
                            <lightning-combobox label="Status" value={status} options={statusOptions}
                                onchange={handleStatusChange} disabled={isLoading} class="slds-m-bottom_small">
                            </lightning-combobox>
                            <p class="slds-m-top_small"><strong>Primary Object:</strong> {template.Primary_Object__c}</p>
                            <p><strong>Version:</strong> {template.Version__c}</p>
                        </div>

                        <div class="slds-box slds-m-bottom_small">
                            <h3 class="slds-text-heading_small slds-m-bottom_small">Preview</h3>
                            <lightning-input label="Sample Record ID" value={sampleRecordId}
                                onchange={handleSampleRecordChange}
                                placeholder="Enter a record ID to preview"></lightning-input>

                            <!-- Output Format Selection for Word Templates -->
                            <template if:true={isWordTemplate}>
                                <div class="slds-m-top_small slds-m-bottom_small">
                                    <lightning-radio-group
                                        label="Output Format"
                                        options={outputFormatOptions}
                                        value={outputFormat}
                                        onchange={handleOutputFormatChange}
                                        type="radio">
                                    </lightning-radio-group>
                                </div>
                            </template>

                            <lightning-button label="Preview" variant="brand" onclick={handlePreview} disabled={isLoading}
                                class="slds-m-top_small"></lightning-button>
                        </div>

                        <template if:true={discoveredFields.length}>
                            <div class="slds-box">
                                <h3 class="slds-text-heading_small slds-m-bottom_small">Discovered Fields</h3>
                                <lightning-datatable key-field="path" data={discoveredFields}
                                    columns={discoveredFieldsColumns} hide-checkbox-column></lightning-datatable>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </div>
    </lightning-card>

    <!-- Preview Modal -->
    <template if:true={showPreview}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">Document Preview</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium"
                    style="min-height: 400px; max-height: 80vh; overflow-y: auto;">
                    <template if:true={previewLoading}>
                        <div class="slds-align_absolute-center" style="min-height: 300px;">
                            <lightning-spinner alternative-text="Generating preview..."></lightning-spinner>
                        </div>
                    </template>
                    <template if:false={previewLoading}>
                        <!-- PDF Preview using pdfjsViewer -->
                        <template if:true={previewPdfBytes}>
                            <c-pdfjs-viewer pdf-bytes={previewPdfBytes} file-name={template.Name}></c-pdfjs-viewer>
                        </template>
                        <!-- HTML Preview for HTML templates (fallback) -->
                        <template if:false={previewPdfBytes}>
                            <template if:true={previewPdfUrl}>
                                <iframe src={previewPdfUrl} width="100%" height="600px" style="border: none;"></iframe>
                            </template>
                            <template if:false={previewPdfUrl}>
                                <div class="preview-container"></div>
                            </template>
                        </template>
                    </template>
                </div>

                <footer class="slds-modal__footer">
                    <template if:true={previewPdfBytes}>
                        <lightning-button label="Download PDF" variant="brand" onclick={handleDownloadPreview} class="slds-m-right_small"></lightning-button>
                    </template>
                    <lightning-button label="Close" onclick={handleClosePreview}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Loading Spinner (shown when generating preview) -->
    <template if:true={previewLoading}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <div class="slds-modal__content slds-p-around_medium" style="min-height: 300px;">
                    <div class="slds-align_absolute-center">
                        <lightning-spinner alternative-text="Generating preview..."></lightning-spinner>
                    </div>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Loading Spinner (for other operations) -->
    <template if:true={isLoading}>
        <template if:false={previewLoading}>
            <lightning-spinner alternative-text="Processing..."></lightning-spinner>
        </template>
    </template>
</template>
