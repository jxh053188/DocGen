<template lwc:render-mode="light">
    <lightning-card title="PDF Viewer Test (Outside Modal)">
        <div class="slds-p-around_medium">
            <div class="slds-m-bottom_medium">
                <lightning-button label="Regenerate Test PDF" onclick={handleRegenerate} disabled={loading}
                    variant="brand">
                </lightning-button>
            </div>

            <template if:true={error}>
                <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error" role="alert">
                    <span class="slds-assistive-text">error</span>
                    <h2>{error}</h2>
                </div>
            </template>

            <template if:true={loading}>
                <div class="slds-align_absolute-center" style="min-height: 200px;">
                    <lightning-spinner alternative-text="Generating test PDF..."></lightning-spinner>
                </div>
            </template>

            <template if:false={loading}>
                <template if:true={pdfBytes}>
                    <div class="slds-border_top slds-p-top_medium">
                        <h3 class="slds-text-heading_small slds-m-bottom_small">PDF.js LWS Viewer:</h3>
                        <div data-id="pdf-container" class="slds-box slds-p-around_small"
                            style="min-height: 400px; background-color: #f3f3f3;">
                        </div>

                        <div class="slds-m-top_medium">
                            <h3 class="slds-text-heading_small slds-m-bottom_small">Original PDF Viewer (for
                                comparison):</h3>
                            <c-pdfjs-viewer pdf-bytes={pdfBytes} file-name="test.pdf"></c-pdfjs-viewer>
                        </div>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
